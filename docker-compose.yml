services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sales
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - 0.0.0.0:3306:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./database/1_populate.sql:/docker-entrypoint-initdb.d/1_populate.sql
    networks:
      - blitz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blitz-app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: user_password
      DB_NAME: sales
    depends_on:
      - db
    networks:
      - blitz-network

  nginx:
    image: nginx:1.25-alpine
    container_name: blitz-nginx
    ports:
      - 0.0.0.0:80:80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./portals/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - db
    networks:
      - blitz-network

networks:
  blitz-network:
    driver: bridge

volumes:
  db_data:
