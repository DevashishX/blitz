# Nginx reverse proxy and static file server for Blitz flash sale platform
# Handles:
#  - Static frontend files (SPA serving)
#  - API request routing to FastAPI backend
#  - Load balancing (ready for horizontal scaling)
#  - CORS and caching headers

upstream backend {
    # Point to FastAPI backend container
    server blitz-app:8080;
}

server {
    listen 80 default_server;
    server_name _;

    # Gzip compression for faster transfers
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Static file serving for frontend
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ============================================================
    # STATIC ASSETS - Cache aggressive for performance
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # HTML FILES - No cache (SPA routing)
    # ============================================================
    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ============================================================
    # API PROXY - Route to FastAPI backend
    # ============================================================
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;

        # Header forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for flash sale spikes
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings for performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;

        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    # SPA ROOT - Serve index.html for all unmatched routes
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ============================================================
    # HEALTH CHECK - For load balancing verification
    # ============================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================================
    # DENY ACCESS - Security
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
